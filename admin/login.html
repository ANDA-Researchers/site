---
layout: admin
title: Login
permalink: /admin/login/
---

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ '/images/anda.svg' | relative_url }}" alt="ANDA" height="32" id="login-logo-img">
      <div>
        <div class="login-logo-text">ANDA Lab</div>
        <div class="login-logo-sub">Admin Panel</div>
      </div>
    </div>
    <h1 class="login-title">Sign in</h1>
    <p class="login-sub">Use your lab admin credentials to continue.</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@lab.kr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
    </form>
    <div class="login-error" id="login-error"></div>
    <div class="login-pending" id="login-pending">
      Your account is pending admin approval. Please contact the lab administrator.
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xarrinotiwofnyzrmdow.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2nfPOvAO8gf0TqP97YDz6w_swUIUk41';
const BASE = '{{ site.baseurl }}';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Fix logo for dark theme
document.addEventListener('DOMContentLoaded', () => {
  const theme = document.documentElement.getAttribute('data-theme');
  if (theme === 'dark') {
    document.getElementById('login-logo-img').src = BASE + '/images/anda_dark.svg';
  }
});

// Redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) checkAndRedirect(session.access_token);
});

async function checkAndRedirect(token) {
  const { data: profile } = await sb.from('profiles').select('status').eq('id', (await sb.auth.getUser(token)).data.user?.id).single();
  if (profile?.status === 'active') {
    window.location.href = BASE + '/admin/';
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  const pendingEl = document.getElementById('login-pending');
  errorEl.classList.remove('show');
  pendingEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  // Check profile status
  const { data: profile } = await sb.from('profiles').select('status').eq('id', data.user.id).single();
  if (!profile || profile.status === 'pending') {
    pendingEl.classList.add('show');
    await sb.auth.signOut();
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  window.location.href = BASE + '/admin/';
});
</script>
