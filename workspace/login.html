---
layout: workspace
title: Login
permalink: /workspace/login/
---

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <img src="{{ '/images/anda.svg' | relative_url }}" alt="ANDA" height="40" id="login-logo-img">
      </div>
      <div class="login-controls">
        <div class="lang-picker" id="login-lang-picker">
          <button class="lang-picker-btn" aria-haspopup="listbox">
            <span class="lang-picker-label">EN</span>
            <svg viewBox="0 0 20 20" fill="currentColor" width="12" height="12"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>
          </button>
          <div class="lang-picker-dropdown" role="listbox">
            <button class="lang-opt" data-lang="en" role="option"><span class="lang-opt-code">EN</span><span class="lang-opt-name">English</span></button>
            <button class="lang-opt" data-lang="ko" role="option"><span class="lang-opt-code">KO</span><span class="lang-opt-name">한국어</span></button>
            <button class="lang-opt" data-lang="vi" role="option"><span class="lang-opt-code">VI</span><span class="lang-opt-name">Tiếng Việt</span></button>
          </div>
        </div>
        <button class="btn-theme" id="login-theme-toggle" title="Toggle theme">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 01.26.77 7 7 0 009.958 7.967.75.75 0 011.067.853A8.5 8.5 0 116.647 1.921a.75.75 0 01.808.083z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </div>
    <h1 class="login-title" data-i18n="login_sign_in">Sign in</h1>
    <p class="login-sub" data-i18n="login_sub">Use your lab admin credentials to continue.</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email" data-i18n="login_email">Email</label>
        <input type="email" id="email" placeholder="you@lab.kr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="login_password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn" data-i18n="login_btn">Sign in</button>
    </form>
    <div class="login-error" id="login-error"></div>
    <div class="login-pending" id="login-pending" data-i18n="login_pending">
      Your account is pending admin approval. Please contact the lab administrator.
    </div>
  </div>
</div>

<script type="module">
import { t, applyI18n, initCustomLangPicker } from '{{ site.baseurl }}/workspace/i18n.js';

const SUPABASE_URL = 'https://xarrinotiwofnyzrmdow.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhcnJpbm90aXdvZm55enJtZG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzA4ODcsImV4cCI6MjA4ODYwNjg4N30.vc57Pod4pb_9QIcGIuuIDcdVgqjggcDIBXuapeeHDB4';
const BASE = '{{ site.baseurl }}';

const { createClient } = supabase;
let sb = null;
let backendReachablePromise = null;

function clearStoredSupabaseSession() {
  const markers = ['supabase.auth.token', 'sb-', 'xarrinotiwofnyzrmdow'];
  [window.localStorage, window.sessionStorage].forEach(store => {
    try {
      const keys = [];
      for (let i = 0; i < store.length; i += 1) {
        const key = store.key(i);
        if (key && markers.some(marker => key.includes(marker))) keys.push(key);
      }
      keys.forEach(key => store.removeItem(key));
    } catch {}
  });
}

function isFetchResolutionError(error) {
  const message = String(error?.message || error || '');
  return message.includes('Failed to fetch')
    || message.includes('ERR_NAME_NOT_RESOLVED')
    || message.includes('Load failed')
    || message.includes('NetworkError');
}

async function checkSupabaseReachable() {
  if (!backendReachablePromise) {
    backendReachablePromise = fetch(SUPABASE_URL + '/auth/v1/health', {
      method: 'GET',
      cache: 'no-store',
      headers: { apikey: SUPABASE_ANON_KEY },
    })
      .then(res => res.ok || res.status === 404 || res.status === 401)
      .catch(() => false);
  }
  return backendReachablePromise;
}

async function ensureSupabase() {
  if (sb) return sb;
  const reachable = await checkSupabaseReachable();
  if (!reachable) {
    clearStoredSupabaseSession();
    return null;
  }
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      autoRefreshToken: false,
      persistSession: true,
      detectSessionInUrl: true,
    },
  });
  return sb;
}

function showBackendUnavailable() {
  const errorEl = document.getElementById('login-error');
  const pendingEl = document.getElementById('login-pending');
  const btn = document.getElementById('login-btn');
  const form = document.getElementById('login-form');
  pendingEl.classList.remove('show');
  errorEl.textContent = t('login_backend_unavailable');
  errorEl.classList.add('show');
  btn.disabled = true;
  form.querySelectorAll('input').forEach(input => { input.disabled = true; });
}

// ── Theme ─────────────────────────────────────
const themeBtn = document.getElementById('login-theme-toggle');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  const logo = document.getElementById('login-logo-img');
  if (logo) logo.src = BASE + '/images/' + (t === 'dark' ? 'anda_dark.svg' : 'anda.svg');
}
themeBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

// ── i18n ──────────────────────────────────────
initCustomLangPicker(document.getElementById('login-lang-picker'));
applyI18n();

// ── Redirect if already logged in ────────────
(async () => {
  const client = await ensureSupabase();
  if (!client) {
    showBackendUnavailable();
    return;
  }
  // Backend is reachable — strip any stale ?error=... so the URL is clean for bookmarks.
  if (window.location.search) {
    const url = new URL(window.location.href);
    if (url.searchParams.has('error')) {
      url.searchParams.delete('error');
      window.history.replaceState({}, '', url.pathname + url.search + url.hash);
    }
  }
  try {
    const { data: { session } } = await client.auth.getSession();
    if (session) checkAndRedirect(session.access_token);
  } catch (error) {
    if (isFetchResolutionError(error)) {
      clearStoredSupabaseSession();
      showBackendUnavailable();
      return;
    }
    throw error;
  }
})();

async function checkAndRedirect(token) {
  const client = await ensureSupabase();
  if (!client) {
    showBackendUnavailable();
    return;
  }
  const { data: profile } = await client.from('profiles').select('status').eq('id', (await client.auth.getUser(token)).data.user?.id).single();
  if (profile?.status === 'active') {
    window.location.href = BASE + '/workspace/';
  }
}

// ── Login form ────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const client = await ensureSupabase();
  if (!client) {
    showBackendUnavailable();
    return;
  }
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  const pendingEl = document.getElementById('login-pending');
  errorEl.classList.remove('show');
  pendingEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = t('login_signing_in');

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await client.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = t('login_btn');
    return;
  }

  const { data: profile } = await client.from('profiles').select('status').eq('id', data.user.id).single();
  if (!profile || profile.status === 'pending') {
    pendingEl.classList.add('show');
    await client.auth.signOut();
    btn.disabled = false;
    btn.textContent = t('login_btn');
    return;
  }

  window.location.href = BASE + '/workspace/';
});
</script>
