<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="theme-color" content="#1a1a2e">
  {%- seo -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {% if page.layout == 'home-parallax' %}
  <link rel="stylesheet" href="{{ '/assets/parallax.css' | relative_url }}">
  {% endif %}
  <link rel="icon" href="{{ '/images/favicon.png' | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
  {%- include google-analytics.html -%}
  {%- endif -%}
  {% if page.layout == 'home-parallax' %}
  <script src="{{ '/assets/js/parallax-scroll.js' | relative_url }}" defer></script>
  {% endif %}
  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      // Add animation classes to elements
      const elements = document.querySelectorAll('.home h1, .home p.lead, .home h2, .research-grid, .post-header, .post-content');
      elements.forEach((el, index) => {
        el.classList.add('animate-fade-in');
        el.style.animationDelay = (0.1 * index) + 's';
      });
    });
  </script>
</head>
