name: Deploy Supabase Edge Functions

# Auto-deploys the four Supabase Edge Functions whenever their source
# changes on main, so `git push` is enough — no separate ritual to
# remember. Also runnable on demand via the Actions tab.
#
# Required repo secret:
#   SUPABASE_ACCESS_TOKEN — generate one at
#     https://supabase.com/dashboard/account/tokens
#   Then Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Don't cancel a deploy mid-flight; let it finish so the live function
  # is never half-deployed. A second push will queue and run after.
  group: deploy-supabase-functions
  cancel-in-progress: false

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: xarrinotiwofnyzrmdow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          set -e
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            echo "Add it at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          for fn in github-proxy invite-user approve-user remove-user; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
            echo "::endgroup::"
          done
