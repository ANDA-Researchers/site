title: ANDA Lab
baseurl: /site
url: https://anda-researchers.github.io
base_path: /site
lang: en
email: hpnq.work@outlook.com
author: ANDA Lab
description: AI-Driven Network and Data Analytics Lab at Soongsil University, focused on autonomous vehicles, computer vision, machine learning, and next-generation networking.
location: Room 1103 Hyungnam Memorial Engineering Building, Soongsil University, 369 Sangdo-ro, Dongjak-gu, Seoul, 06978, South Korea
logo: /images/anda.svg
image: /images/cover.webp
header_pages:
  - about.md
  - team.md
  - projects.md
  - publications.md
  - software.md
  - lablife.md
  - contact.md
  - joinus.md

# Build settings
exclude:
  - supabase/
  - node_modules/
  - vendor/
  - tests/
  - scripts/
  - docs/
  - package.json
  - package-lock.json
  - vitest.config.js
  - repomix-output.xml
  - run_jekyll.cmd
  - run_jekyll.sh
  - run_jekyll.ps1
  - README.md
  - CLAUDE.md

# jekyll-spaceship is not on the GitHub Pages allowlist and is silently
# ignored at build time, so we don't list it here.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at
