<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="logo" aria-label="{{ site.title }}">
      <img src="{{ '/images/anda.svg' | relative_url }}" alt="{{ site.title }}" />
    </a>

    <div class="header-right">
      <nav class="site-nav">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/team/' | relative_url }}">Team</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/software/' | relative_url }}">Software</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
        <a href="{{ '/joinus/' | relative_url }}" class="btn-outline">Join Us</a>
      </nav>

      <button class="nav-hamburger" aria-label="Toggle menu" onclick="document.querySelector('.mobile-nav').classList.toggle('open');this.classList.toggle('active')">
        <span></span><span></span><span></span>
      </button>

      <button class="theme-toggle" aria-label="Toggle light/dark mode" onclick="toggleTheme()">
        <!-- Moon icon — shown in light mode -->
        <svg class="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon — shown in dark mode -->
        <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<nav class="mobile-nav" onclick="if(event.target.tagName==='A'||event.target.closest('.mobile-nav-close')){this.classList.remove('open');document.querySelector('.nav-hamburger').classList.remove('active')}">
  <button class="mobile-nav-close" aria-label="Close menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <a href="{{ '/about/' | relative_url }}">About</a>
  <a href="{{ '/team/' | relative_url }}">Team</a>
  <a href="{{ '/publications/' | relative_url }}">Publications</a>
  <a href="{{ '/software/' | relative_url }}">Software</a>
  <a href="{{ '/projects/' | relative_url }}">Projects</a>
  <a href="{{ '/contact/' | relative_url }}">Contact</a>
  <a href="{{ '/joinus/' | relative_url }}" class="btn-outline">Join Us</a>
</nav>

<script>
  (function () {
    // Apply saved theme before first paint to avoid flash
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    // Swap logo src immediately
    updateLogoSrc(saved);
  })();

  function updateLogoSrc(theme) {
    var logo = document.querySelector('.logo img');
    if (!logo) return;
    var base = '{{ "/" | relative_url }}';
    // strip trailing slash from base
    base = base.replace(/\/$/, '');
    logo.src = theme === 'dark'
      ? base + '/images/anda_dark.svg'
      : base + '/images/anda.svg';
  }

  // Header background on scroll
  (function() {
    var header = document.querySelector('.site-header');
    if (!header) return;
    function check() {
      if (window.scrollY > 40) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    }
    window.addEventListener('scroll', check, { passive: true });
    check();
  })();

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateLogoSrc(next);
    // Notify Three.js scene if present
    if (typeof window.onThemeChange === 'function') window.onThemeChange(next);
  }
</script>
