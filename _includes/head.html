<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">

  {%- seo -%}
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
  {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- Elegant Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/images/favicon.png' | relative_url }}">

  <!-- GSAP for scroll animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <!-- ThreeJS Import Map (r173) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.173.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.173.0/examples/jsm/"
      }
    }
  </script>

  <!-- Our custom ThreeJS App (only on home page) -->
  {% if page.url == '/' %}
  <script type="module" src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
  {% endif %}
</head>
