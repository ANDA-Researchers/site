layout: admin
title: Login
permalink: /admin/login/
---

<div class="login-page">
  <div class="login-card">
    <button class="btn-theme" id="login-theme-toggle" title="Toggle theme" style="position:absolute;top:1.25rem;right:1.25rem">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 01.26.77 7 7 0 009.958 7.967.75.75 0 011.067.853A8.5 8.5 0 116.647 1.921a.75.75 0 01.808.083z" clip-rule="evenodd"/></svg>
    </button>
    <div class="login-logo">
      <img src="{{ '/images/anda.svg' | relative_url }}" alt="ANDA" height="32" id="login-logo-img">
      <div class="login-logo-sub" style="margin-top:0">Admin Panel</div>
    </div>
    <h1 class="login-title">Sign in</h1>
    <p class="login-sub">Use your lab admin credentials to continue.</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@lab.kr" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
    </form>
    <div class="login-error" id="login-error"></div>
    <div class="login-pending" id="login-pending">
      Your account is pending admin approval. Please contact the lab administrator.
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xarrinotiwofnyzrmdow.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhcnJpbm90aXdvZm55enJtZG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzA4ODcsImV4cCI6MjA4ODYwNjg4N30.vc57Pod4pb_9QIcGIuuIDcdVgqjggcDIBXuapeeHDB4';
const BASE = '{{ site.baseurl }}';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Theme toggle
const themeBtn = document.getElementById('login-theme-toggle');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  const logo = document.getElementById('login-logo-img');
  if (logo) logo.src = BASE + '/images/' + (t === 'dark' ? 'anda_dark.svg' : 'anda.svg');
}
themeBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

// Redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) checkAndRedirect(session.access_token);
});

async function checkAndRedirect(token) {
  const { data: profile } = await sb.from('profiles').select('status').eq('id', (await sb.auth.getUser(token)).data.user?.id).single();
  if (profile?.status === 'active') {
    window.location.href = BASE + '/admin/';
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  const pendingEl = document.getElementById('login-pending');
  errorEl.classList.remove('show');
  pendingEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errorEl.textContent = error.message;
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  // Check profile status
  const { data: profile } = await sb.from('profiles').select('status').eq('id', data.user.id).single();
  if (!profile || profile.status === 'pending') {
    pendingEl.classList.add('show');
    await sb.auth.signOut();
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  window.location.href = BASE + '/admin/';
});
</script>
